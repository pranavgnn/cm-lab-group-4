version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: postgres-qfj
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
    networks:
      - qfj-network

  exchange-back-end:
    image: felipewind/exchange-back-end:1.0
    container_name: exchange-back-end
    ports:
      - "8090:8090"
    depends_on:
      - postgres
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: "jdbc:postgresql://postgres:5432/postgres"
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
    networks:
      - qfj-network

  broker-back-end:
    image: felipewind/broker-back-end:1.0
    container_name: broker-back-end
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - exchange-back-end
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: "jdbc:postgresql://postgres:5432/postgres"
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
    networks:
      - qfj-network

  exchange-front-end:
    image: felipewind/exchange-front-end:1.0
    container_name: exchange-front-end
    ports:
      - "90:80"
    depends_on:
      - exchange-back-end
    networks:
      - qfj-network

  broker-front-end:
    image: felipewind/broker-front-end:1.0
    container_name: broker-front-end
    ports:
      - "80:80"
    depends_on:
      - broker-back-end
    networks:
      - qfj-network

volumes:
  postgres:

networks:
  qfj-network:
    driver: bridge
