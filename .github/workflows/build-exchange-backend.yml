name: Build & Push Exchange Backend

on:
  push:
    branches:
      - main
      - master
    paths:
      - "exchange-back-end/**"
      - ".github/workflows/build-exchange-backend.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/exchange-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Ensure import.sql exists
        working-directory: ./exchange-back-end
        run: touch src/main/resources/import.sql

      - name: Build exchange-back-end jar
        working-directory: ./exchange-back-end
        run: mvn -B -DskipTests -Dquarkus.package.type=uber-jar package

      - name: Normalize exchange-back-end jar path
        working-directory: ./exchange-back-end
        run: cp target/*-runner.jar target/app.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./exchange-back-end
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
