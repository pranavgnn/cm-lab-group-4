services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-qfj
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - qfj-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  exchange-back-end:
    build:
      context: ./exchange-back-end
      dockerfile: Dockerfile
    image: fix-trading-simulator/exchange-back-end:local
    container_name: exchange-back-end
    restart: unless-stopped
    ports:
      - "8090:8090"
      - "9876:9876"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_JDBC_URL: "jdbc:postgresql://postgres:5432/postgres"
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
    networks:
      - qfj-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  broker-back-end:
    build:
      context: ./broker-back-end
      dockerfile: Dockerfile
    image: fix-trading-simulator/broker-back-end:local
    container_name: broker-back-end
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      exchange-back-end:
        condition: service_started
    environment:
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_JDBC_URL: "jdbc:postgresql://postgres:5432/postgres"
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
    networks:
      - qfj-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  exchange-front-end:
    build:
      context: ./exchange-front-end
      dockerfile: Dockerfile
    image: fix-trading-simulator/exchange-front-end:local
    container_name: exchange-front-end
    restart: unless-stopped
    ports:
      - "90:80"
    depends_on:
      exchange-back-end:
        condition: service_started
    networks:
      - qfj-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  broker-front-end:
    build:
      context: ./broker-front-end
      dockerfile: Dockerfile
    image: fix-trading-simulator/broker-front-end:local
    container_name: broker-front-end
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      broker-back-end:
        condition: service_started
    networks:
      - qfj-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres:

networks:
  qfj-network:
    driver: bridge
