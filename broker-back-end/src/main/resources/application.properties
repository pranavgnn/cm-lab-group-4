quarkus.application.name=broker-back-end

# Datasource Configuration (H2 for all profiles - can switch to PostgreSQL when Docker is available)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:broker;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate Configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql

# Server Configuration
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# OpenAPI/Swagger
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.title=Broker Back-End API

# QuickFIX Configuration
quickfix.appVersion=1.0
quickfix.password=password123
quickfix.activateScreenLog=false
quickfix.autoStart=true
quickfix.host=localhost
quickfix.port=9876
quickfix.heartbeat=30
quickfix.reconnect.interval=5
quickfix.logon.timeout=30
